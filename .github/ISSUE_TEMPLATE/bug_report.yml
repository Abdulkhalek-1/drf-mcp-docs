name: Bug Report
description: Report a bug or unexpected behavior in drf-mcp-docs
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I run the MCP server and try to..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      value: |
        1. Install drf-mcp-docs with `pip install drf-mcp-docs`
        2. Add to INSTALLED_APPS
        3. Run `python manage.py runmcpserver`
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, tracebacks, or screenshots if applicable.
    validations:
      required: true

  - type: dropdown
    id: schema-adapter
    attributes:
      label: Schema Adapter
      description: Which schema generator are you using?
      options:
        - drf-spectacular
        - drf-yasg
        - DRF built-in
        - Auto-detect (default)
        - Custom adapter
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: Which transport are you using?
      options:
        - stdio
        - streamable-http
    validations:
      required: true

  - type: dropdown
    id: ai-tool
    attributes:
      label: AI Tool / MCP Client
      description: Which AI tool or MCP client are you connecting with?
      options:
        - Claude Code
        - Cursor
        - VS Code + MCP extension
        - Claude Desktop
        - MCP Inspector
        - Custom client
        - Other
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details.
      value: |
        - drf-mcp-docs version:
        - Python version:
        - Django version:
        - DRF version:
        - Schema generator version (if applicable):
        - OS:
    validations:
      required: true

  - type: textarea
    id: settings
    attributes:
      label: DRF_MCP_DOCS Settings
      description: Your `DRF_MCP_DOCS` settings dict from `settings.py` (if customized).
      render: python
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots about the problem.
    validations:
      required: false
